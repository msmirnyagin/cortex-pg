# cortex-pg — Tier 1: слабый сервер (1 ГБ RAM / 1 CPU / 20 ГБ SSD).
# Этот файл ДОБАВЛЯЕТСЯ (append) к postgresql.conf.sample при сборке образа
# с CORTEX_TIER=min. Главный принцип: жёсткая экономия RAM, минимум воркеров.
# Бюджет: OS ~250МБ + shared_buffers 192МБ + коннекты ~50МБ + воркеры ~60МБ.

# --- Память (всего 1 ГБ) ---
shared_buffers = 192MB            # ~20%; больше — OOM
effective_cache_size = 700MB      # подсказка планировщику (OS cache доступен)
work_mem = 2MB                    # жёстко: всплески на сортировке/hash = смерть
maintenance_work_mem = 64MB       # CREATE INDEX / REINDEX turboquant
wal_buffers = 4MB

# --- Коннекции: ОБЯЗАТЕЛЬНО PgBouncer сверху (transaction-mode, pool 4-5) ---
max_connections = 12              # 12 × ~10МБ = ~120МБ — потолок

# --- 1 CPU: никакого параллелизма ---
max_worker_processes = 6
max_parallel_workers = 0
max_parallel_workers_per_gather = 0
max_parallel_maintenance_workers = 0

# --- Минимальный preload: воркеры отключены ради RAM ---
# pg_durable, pg_net, pg_cron, pg_stat_statements — ВЫКЛЮЧЕНЫ на Tier 1.
# Оркистрация переносится в слой приложения (внешний воркер + pgmq).
shared_preload_libraries = 'pgsodium'

# --- Autovacuum: агрессивнее (bloat = смерть на слабом сервере) ---
autovacuum = on
autovacuum_max_workers = 2
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# --- SSD / latency ---
random_page_cost = 1.1
effective_io_concurrency = 200
checkpoint_completion_target = 0.9

# --- Защита от зависших агентов ---
statement_timeout = 30000         # 30 с
idle_in_transaction_session_timeout = 60000

# --- Версии/логирование минимально ---
log_min_duration_statement = 1000 # лог медленных (>1с) запросов
