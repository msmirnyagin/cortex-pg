# cortex-pg — PgBouncer (transaction-mode).
# Запускается ОТДЕЛЬНЫМ контейнером/sidecar перед Postgres, НЕ встраивается
# в образ БД. Это спасает слабый сервер от коннект-штормов агентов.
# Порт 6432 → пул → Postgres:5432.
#
# Запуск (docker/Apple Containers):
#   container run -d --name pgbouncer -p 6432:6432 \
#     -e DATABASES_HOST=cortex-pg -e DB_USER=postgres -e DB_PASSWORD=... \
#     -v ./config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro \
#     -v ./config/pgbouncer-userlist.txt:/etc/pgbouncer/userlist.txt:ro \
#     edoburu/pgbouncer:latest
# (образ edoburu/pgbouncer читает DATABASES_* из env; либо статичный userlist ниже)

[databases]
; cortex-pg = host=cortex-pg port=5432 dbname=postgres pool_size=8
; «cortex-pg» — имя контейнера БД в одной docker-сети; на VPS — IP/хост БД.
cortex-pg = host=127.0.0.1 port=5432 dbname=postgres pool_size=8

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

# Режим пула: transaction — соединение возвращается в пул после каждой транзакции.
# ⚠️ НЕ использовать session-mode (съест RAM). transaction требует, чтобы агенты
# НЕ держали prepared statements/SET между транзакциями (или включить max_prepared).
pool_mode = transaction

# Размер пула на БД (см. pool_size выше) + резерв.
default_pool_size = 8
reserve_pool_size = 2
reserve_pool_timeout = 3
max_client_conn = 200           # сколько агентов могут подключиться к PgBouncer

# Таймауты (в секундах) — не держим простаивающие серверные коннекты.
server_idle_timeout = 240
server_lifetime = 3600
query_wait_timeout = 120        # агент ждёт сервер ≤2мин, иначе ошибка (не виснет)

# Аутентификация: SCRAM для современных клиентов.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

# Логирование.
log_connections = 1
log_disconnections = 0          # шумно; включить при дебаге
log_pooler_errors = 1
admin_users = postgres
