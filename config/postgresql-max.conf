# cortex-pg — Tier 2: сервер побольше (2 ГБ RAM / 4 CPU / 40 ГБ SSD).
# Этот файл ДОБАВЛЯЕТСЯ (append) к postgresql.conf.sample при сборке образа
# с CORTEX_TIER=max. Полный стек включён; небольшой параллелизм на реиндекс.

# --- Память (2 ГБ) ---
shared_buffers = 512MB            # 25%
effective_cache_size = 1536MB     # ~75% подсказка планировщику
work_mem = 4MB
maintenance_work_mem = 128MB      # ускорит CREATE INDEX turboquant
wal_buffers = 16MB

# --- Коннекции: PgBouncer (transaction-mode, pool ~8-10) ---
max_connections = 25

# --- 4 CPU: немного параллелизма на тяжёлую работу ---
max_worker_processes = 12
max_parallel_workers = 2
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2   # ускорит CREATE INDEX

# --- Полный preload ---
# supabase_vault: грузит корневой ключ при старте ТОЛЬКО из preload (_PG_init).
shared_preload_libraries = 'pg_cron, pg_durable, pg_search, supabase_vault, pg_net'
vault.getkey_script = '/usr/local/bin/vault-getkey.sh'
# pg_durable: его background worker подключается к management-pool как эта роль.
#   дефолт 'azuresu' (Azure-наследие) НЕ существует в образе → FATAL-retry каждые 5с.
#   'postgres' — дефолтный суперпользователь, всегда есть. (GUC контекста postmaster,
#   т.е. только через postgresql.conf + рестарт.) На Tier 1 pg_durable не грузится — GUC не нужен.
pg_durable.worker_role = 'postgres'

# --- Autovacuum ---
autovacuum = on
autovacuum_max_workers = 3
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# --- SSD / latency ---
random_page_cost = 1.1
effective_io_concurrency = 200
checkpoint_completion_target = 0.9
max_wal_size = 2GB

# --- Защита от зависших агентов ---
statement_timeout = 30000
idle_in_transaction_session_timeout = 60000

# --- Логирование ---
log_min_duration_statement = 1000
