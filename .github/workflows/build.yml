# Сборка cortex-pg под linux/amd64 + linux/arm64 и публикация в GHCR.
# Нативные раннеры под каждую арх (без QEMU) — критично для тяжёлых Rust/C-сборок.
#   • build    — matrix по арх: каждая арх собирается, smoke-тестируется, пушит
#                арх-специфичный тег sha-<short>-<arch>.
#   • manifest — собирает оба арх-тега в единый multi-arch манифест (latest/main/sha).
name: build-and-push

on:
  push:
    branches: [main, master]
    tags: ['v*']            # релизные теги → семверные image-теги
    paths:
      - 'Dockerfile'
      - 'init.sql'
      - 'sql/**'
      - 'config/**'          # tier-конфиги пекутся в образ (COPY)
      - '.github/workflows/build.yml'
  workflow_dispatch:        # ручной запуск с выбором тира
    inputs:
      tier:
        description: 'Профиль конфига (min = 1GB, max = 2GB)'
        type: choice
        default: max
        options: [min, max]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write        # право пушить в GHCR

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # встроенный токен, без доп. секрета

      # Арх-специфичный тег для push (единый multi-arch манифест делает job `manifest`).
      - name: Compute short sha
        id: sha
        run: printf 'short=%s\n' "$(printf '%s' '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build local image (для smoke-теста)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: false
          load: true
          tags: cortex-pg:smoke
          build-args: |
            CORTEX_TIER=${{ github.event.inputs.tier || 'max' }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

      - name: Smoke test (boot + расширения + vault)
        run: |
          set -euo pipefail
          docker run -d --name smoke \
            -e POSTGRES_PASSWORD=test -e POSTGRES_DB=postgres \
            cortex-pg:smoke

          # pg_isready зелёный ⇒ postgres поднялся ⇒ все shared_preload_libraries
          # (.so) загрузились, включая supabase_vault + vault.getkey_script.
          echo "Ожидание готовности postgres (таймаут 120с)..."
          if ! timeout 120 bash -c 'until docker exec smoke pg_isready -U postgres -d postgres >/dev/null 2>&1; do sleep 2; done'; then
            echo "❌ postgres не стартовал за 120с. Логи контейнера:"
            docker logs smoke || true
            exit 1
          fi
          echo "✓ postgres стартовал — все preload-библиотеки загружены"

          echo "== 99-verify.sql =="
          docker exec smoke psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -f /docker-entrypoint-initdb.d/sql/99-verify.sql

          echo "== assertions =="
          EXT_COUNT=$(docker exec smoke psql -U postgres -d postgres -tAc \
            "SELECT count(*) FROM pg_extension WHERE extname IN \
             ('vector','pg_turboquant','age','pg_search','pgmq','rum',\
              'pg_net','index_advisor','supabase_vault','pg_jsonschema','pg_graphql')")
          echo "расширений из ядpa: $EXT_COUNT (нужно >= 9)"
          [ "$EXT_COUNT" -ge 9 ] || { echo "❌ слишком мало расширений создалось"; docker logs smoke --tail 50 || true; exit 1; }

          VAULT_SCHEMA=$(docker exec smoke psql -U postgres -d postgres -tAc \
            "SELECT count(*) FROM information_schema.schemata WHERE schema_name='vault'")
          echo "vault schema: $VAULT_SCHEMA"
          [ "$VAULT_SCHEMA" -eq 1 ] || { echo "❌ vault schema не создан (шифрование секретов не работает)"; exit 1; }

          # Проверяем что корневой ключ реально загружен (vault поднят из preload).
          # vault.create_secret шифрует через загруженный ключ — если ключа нет, упадёт.
          docker exec smoke psql -U postgres -d postgres -tAc \
            "SELECT vault.create_secret('smoke-test-secret', 'smoke')" >/dev/null \
            || { echo "❌ vault.create_secret не работает — корневой ключ не загружен (preload/getkey)"; docker logs smoke --tail 50 || true; exit 1; }
          echo "✓ vault шифрует секреты (корневой ключ загружен)"

          echo "✓ smoke-тест пройден [${{ matrix.arch }}]"
          docker stop smoke || true

      - name: Build and push (single-arch, arch-suffixed tag)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          provenance: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            CORTEX_TIER=${{ github.event.inputs.tier || 'max' }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  # Объединяет обе арх в единый multi-arch манифест под финальными тегами.
  # imagetools create строит manifest list, ссылающийся на оба арх-тега.
  manifest:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate final multi-arch tags + assemble manifest
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          SHORT_SHA="sha-$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          SOURCES="${IMAGE}:${SHORT_SHA}-amd64 ${IMAGE}:${SHORT_SHA}-arm64"

          # Базовый multi-arch тег всегда есть: sha-<short> (без суффикса арх).
          TAGS="${IMAGE}:${SHORT_SHA}"
          case "$GITHUB_REF" in
            refs/tags/v*)
              VERSION="${GITHUB_REF#refs/tags/v}"
              TAGS="${TAGS} ${IMAGE}:${VERSION}"
              MAJOR_MINOR="$(printf '%s' "$VERSION" | sed -E 's/^([0-9]+\.[0-9]+).*/\1/')"
              TAGS="${TAGS} ${IMAGE}:${MAJOR_MINOR}"
              ;;
            refs/heads/*)
              BRANCH="${GITHUB_REF#refs/heads/}"
              BRANCH_TAG="$(printf '%s' "$BRANCH" | sed -E 's/[^a-zA-Z0-9._-]+/-/g')"
              TAGS="${TAGS} ${IMAGE}:${BRANCH_TAG}"
              if [ "$BRANCH" = main ] || [ "$BRANCH" = master ]; then
                TAGS="${TAGS} ${IMAGE}:latest"
              fi
              ;;
          esac

          TAG_ARGS=""
          for t in $TAGS; do TAG_ARGS="$TAG_ARGS -t $t"; done
          echo "Создание multi-arch манифеста: tags=[$TAGS] sources=[$SOURCES]"
          docker buildx imagetools create $TAG_ARGS $SOURCES
          echo "✓ multi-arch манифест опубликован"
