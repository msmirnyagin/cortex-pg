# Сборка cortex-pg под linux/amd64 и публикация в GHCR.
# Нативный amd64-раннер (без эмуляции) — подходит для тяжёлых Rust/C-сборок,
# которые на слабом VPS или кросс-сборке на Mac заняли бы слишком долго.
name: build-and-push

on:
  push:
    branches: [main, master]
    tags: ['v*']            # релизные теги → отдельный image-тег
    paths:
      - 'Dockerfile'
      - 'init.sql'
      - 'sql/**'
      - 'config/**'          # tier-конфиги пекутся в образ (COPY)
      - '.github/workflows/build.yml'
  workflow_dispatch:        # ручной запуск с выбором тира
    inputs:
      tier:
        description: 'Профиль конфига (min = 1GB, max = 2GB)'
        type: choice
        default: max
        options: [min, max]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest   # нативный amd64, без QEMU/Rosetta
    permissions:
      contents: read
      packages: write        # право пушить в GHCR

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # встроенный токен, без доп. секрета

      # Теги генерируем вручную из github.ref/github.sha (БЕЗ API-запросов).
      # docker/metadata-action@v5 ранее падал на авариях GitHub API (Unicorn 503
      # в is_default_branch) — ручной способ неуязвим к сбоям API.
      # Логика тегов (как раньше): sha-<7>, branch, latest на main, semver на v*.
      - name: Generate image tags (API-free)
        id: tags
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          SHORT_SHA="sha-$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          TAGS="${IMAGE}:${SHORT_SHA}"
          case "$GITHUB_REF" in
            refs/tags/v*)
              VERSION="${GITHUB_REF#refs/tags/v}"
              TAGS="${TAGS},${IMAGE}:${VERSION}"
              MAJOR_MINOR="$(printf '%s' "$VERSION" | sed -E 's/^([0-9]+\.[0-9]+).*/\1/')"
              TAGS="${TAGS},${IMAGE}:${MAJOR_MINOR}"
              ;;
            refs/heads/*)
              BRANCH="${GITHUB_REF#refs/heads/}"
              BRANCH_TAG="$(printf '%s' "$BRANCH" | sed -E 's/[^a-zA-Z0-9._-]+/-/g')"
              TAGS="${TAGS},${IMAGE}:${BRANCH_TAG}"
              if [ "$BRANCH" = main ] || [ "$BRANCH" = master ]; then
                TAGS="${TAGS},${IMAGE}:latest"
              fi
              ;;
          esac
          printf 'tags=%s\n' "$TAGS" >> "$GITHUB_OUTPUT"
          echo "Сгенерированы теги: $TAGS"

      - name: Build local image (для smoke-теста)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: cortex-pg:smoke
          build-args: |
            CORTEX_TIER=${{ github.event.inputs.tier || 'max' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (boot + расширения + vault)
        run: |
          set -euo pipefail
          docker run -d --name smoke \
            -e POSTGRES_PASSWORD=test -e POSTGRES_DB=postgres \
            cortex-pg:smoke

          # pg_isready зелёный ⇒ postgres поднялся ⇒ все shared_preload_libraries
          # (.so) загрузились, включая supabase_vault + vault.getkey_script.
          echo "Ожидание готовности postgres (таймаут 120с)..."
          if ! timeout 120 bash -c 'until docker exec smoke pg_isready -U postgres -d postgres >/dev/null 2>&1; do sleep 2; done'; then
            echo "❌ postgres не стартовал за 120с. Логи контейнера:"
            docker logs smoke || true
            exit 1
          fi
          echo "✓ postgres стартовал — все preload-библиотеки загружены"

          echo "== 99-verify.sql =="
          docker exec smoke psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -f /docker-entrypoint-initdb.d/sql/99-verify.sql

          echo "== assertions =="
          EXT_COUNT=$(docker exec smoke psql -U postgres -d postgres -tAc \
            "SELECT count(*) FROM pg_extension WHERE extname IN \
             ('vector','pg_turboquant','age','pg_search','pgmq','rum',\
              'pg_net','index_advisor','supabase_vault','pg_jsonschema','pg_graphql')")
          echo "расширений из ядpa: $EXT_COUNT (нужно >= 9)"
          [ "$EXT_COUNT" -ge 9 ] || { echo "❌ слишком мало расширений создалось"; docker logs smoke --tail 50 || true; exit 1; }

          VAULT_SCHEMA=$(docker exec smoke psql -U postgres -d postgres -tAc \
            "SELECT count(*) FROM information_schema.schemata WHERE schema_name='vault'")
          echo "vault schema: $VAULT_SCHEMA"
          [ "$VAULT_SCHEMA" -eq 1 ] || { echo "❌ vault schema не создан (шифрование секретов не работает)"; exit 1; }

          # Проверяем что корневой ключ реально загружен (vault поднят из preload).
          # vault.create_secret шифрует через загруженный ключ — если ключа нет, упадёт.
          docker exec smoke psql -U postgres -d postgres -tAc \
            "SELECT vault.create_secret('smoke-test-secret', 'smoke')" >/dev/null \
            || { echo "❌ vault.create_secret не работает — корневой ключ не загружен (preload/getkey)"; docker logs smoke --tail 50 || true; exit 1; }
          echo "✓ vault шифрует секреты (корневой ключ загружен)"

          echo "✓ smoke-тест пройден"
          docker stop smoke || true

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            CORTEX_TIER=${{ github.event.inputs.tier || 'max' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
